---
# Role       : remove_unused_accounts_groups
# Description: Remove unused accounts and groups

- name: Remove specifics accounts with homes folder
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: "{{ remove_unused_accounts_groups_user_remove_options.remove_home | bool }}"
    force: "{{ remove_unused_accounts_groups_user_remove_options.force | bool }}"
  loop: "{{ remove_unused_accounts_groups_users_to_remove }}"
  become: true

- name: Remove accounts optionals additional
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: "{{ remove_unused_accounts_groups_user_remove_options.remove_home | bool }}"
    force: "{{ remove_unused_accounts_groups_user_remove_options.force | bool }}"
  loop: "{{ remove_unused_accounts_groups_additional_users }}"
  become: true

- name: Remove groups (if this exists)
  ansible.builtin.group:
    name: "{{ item }}"
    state: absent
  loop: "{{ remove_unused_accounts_groups_users_to_remove }}"
  become: true
