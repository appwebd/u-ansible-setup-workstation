---
# Role        : sshd_client_alive
# Description : Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured
# Wazuh ID    : 35646

- name: "Gather package facts to detect sshd"
  ansible.builtin.package_facts:
    manager: auto

- name: "Check if openssh-server package is installed"
  ansible.builtin.set_fact:
    openssh_server_package_installed: "{{ 'openssh-server' in ansible_facts.packages }}"

- name: "Task block when openssh-server is installed"
  when: openssh_server_package_installed | bool
  become: true
  block:

    - name: "Ensure sshd configuration directory exists"
      ansible.builtin.file:
        path: "{{ sshd_include_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Ensure ClientAliveInterval and ClientAliveCountMax are configured in sshd_config"
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_file }}"
        regexp: "^\\s*(#ClientAliveInterval|#ClientAliveCountMax)\\s+.*$"
        line: "{{ item.line }}"
        state: present
        owner: root
        group: root
        mode: "0644"
        backrefs: true
      loop:
        - line: "ClientAliveInterval {{ sshd_client_alive_interval }}"
        - line: "ClientAliveCountMax {{ sshd_client_alive_count_max }}"
      notify: Restart sshd

    - name: "Verify sshd configuration syntax"
      ansible.builtin.command: sshd -t
      register: sshd_config_test
      changed_when: false
      failed_when: sshd_config_test.rc != 0
      notify: Restart sshd

    - name: "Ensure sshd service is running and enabled"
      ansible.builtin.systemd:
        name: "{{ sshd_service_name }}"
        state: started
        enabled: true
        daemon_reload: true

- name: Verify if openssh-server is installed
  ansible.builtin.debug:
    msg: "openssh-server IS NOT installed on this host. SSH configuration tasks are skipped."
  when: "'openssh-server' not in ansible_facts.packages"
