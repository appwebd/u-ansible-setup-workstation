---
# Role        : configure_gshadow_minus_permissions
# Description : Ensure permissions on /etc/gshadow- are configured
# Wazuh ID    : 35768

- name: "Verify /etc/gshadow- file exists"
  ansible.builtin.stat:
    path: "{{ gshadow_file_path }}"
  register: file_stat
  changed_when: false

- name: "Ensure /etc/gshadow- ownership is set correctly"
  ansible.builtin.file:
    path: "{{ gshadow_file_path }}"
    owner: "{{ expected_owner }}"
    group: "{{ expected_group }}"
    state: file
  when: file_stat.stat.exists

- name: "Ensure /etc/gshadow- permissions are set correctly (mode 0640 or 0600)"
  ansible.builtin.file:
    path: "{{ gshadow_file_path }}"
    mode: "{{ expected_mode }}"
    state: file
  when: file_stat.stat.exists
  failed_when: false

- name: "Ensure /etc/gshadow- has no world-readable or world-writable permissions"
  ansible.builtin.stat:
    path: "{{ gshadow_file_path }}"
  register: file_perms_check
  when: file_stat.stat.exists

- name: "Debug variable check file mode"
  ansible.builtin.debug:
    msg: "debug file {{ gshadow_file_path }} has mode: {{ file_perms_check.stat.mode }}"
  changed_when: false

- name: "Ensure /etc/shadow- has no world-readable or world-writable permissions"
  ansible.builtin.stat:
    path: "{{ gshadow_file_path }}"
  register: register_file_perms_check
  when: file_stat.stat.exists

- name: "Fail if /etc/shadow- permissions are insecure (world-readable or writable)"
  ansible.builtin.fail:
    msg: "File /etc/gshadow- has insecure permissions: {{ register_file_perms_check.mode | default('unknown') }} (allowed: 0600 or 0640)"
  when:
    - file_stat.stat.exists
    - register_file_perms_check.stat.mode is not defined or register_file_perms_check.stat.mode not in ['0600', '0640']
