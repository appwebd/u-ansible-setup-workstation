---
# Role        : sshd_permituserenvironment
# Description : Ensure sshd PermitUserEnvironment is disabled (Wazuh ID 35660)
# Wazuh ID    : 35660
# Remediation : Set PermitUserEnvironment no above any Include and Match entries.
#               First occurrence of an option takes precedence.

- name: "Gather package facts to detect sshd"
  ansible.builtin.package_facts:
    manager: auto

- name: "Check if openssh-server package is installed"
  ansible.builtin.set_fact:
    openssh_server_package_installed: "{{ 'openssh-server' in ansible_facts.packages }}"

- name: "Task block when openssh-server is installed"
  when: openssh_server_package_installed | bool
  become: true
  block:

    - name: "Remove any existing PermitUserEnvironment entries (commented or uncommented)"
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_file }}"
        regexp: '^\s*#?\s*[Pp]ermitUserEnvironment\s+'
        state: absent
      when:
        - sshd_config_file is defined

    - name: "Ensure PermitUserEnvironment is set to no in sshd_config (before any Include/Match entries)"
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_file }}"
        regexp: '^PermitUserEnvironment\s+'
        line: "PermitUserEnvironment {{ sshd_permituserenvironment_value }}"
        state: present
        owner: root
        group: root
        mode: '0644'
        insertbefore: '^\s*(#?Include\s+.*|Match\s+)'
        validate: 'sshd -t -f %s'
      notify: Restart sshd
      when:
        - sshd_config_file is defined
        - sshd_permituserenvironment_value | lower == 'no'

- name: Verify if openssh-server is installed
  ansible.builtin.debug:
    msg: "openssh-server IS NOT installed on this host. SSH configuration tasks are skipped."
  when: "'openssh-server' not in ansible_facts.packages"
