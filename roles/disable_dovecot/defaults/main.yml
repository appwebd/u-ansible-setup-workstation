---
# defaults/main.yml
# Default variables for the disable_dovecot role
# These values can be overridden by inventory or playbook variables

disable_dovecot_enabled: true
disable_dovecot_remove_packages: true
disable_dovecot_mask_services: false
dovecot_packages:
  - dovecot-imapd
  - dovecot-pop3d
dovecot_services:
  - dovecot.socket
  - dovecot.service
