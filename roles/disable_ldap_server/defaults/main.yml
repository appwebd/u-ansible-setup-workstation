---
# defaults/main.yml
# Default variables for the disable_ldap_server role
# These values can be overridden by inventory or playbook vars

disable_ldap_server_enabled: true
ldap_service_name: slapd
ldap_modprobe_conf_dir: /etc/modprobe.d
ldap_modprobe_blacklist_file: "{{ ldap_modprobe_conf_dir }}/slapd.conf"
