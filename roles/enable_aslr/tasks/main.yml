---
# Role        : enable_aslr
# Description : Ensure address space layout randomization is enabled
# Wazuh ID    : 35542

- name: "Set ASLR kernel parameter in sysctl.d configuration file"
  ansible.builtin.copy:
    dest: "{{ aslr_sysctl_file }}"
    content: "{{ aslr_sysctl_name }} = {{ aslr_sysctl_value }}"
    owner: root
    group: root
    mode: "0644"
    force: true
  notify: Reload sysctl

- name: "Apply ASLR setting immediately (if reload requested)"
  ansible.builtin.command: sysctl -p "{{ aslr_sysctl_file }}"
  when: aslr_sysctl_reload | bool
  changed_when: false

- name: "Ensure sysctl service is enabled (Debian/Ubuntu)"
  ansible.builtin.service:
    name: procps
    enabled: true
  when: ansible_facts.os_family == "Debian"

- name: "Verify ASLR mode is correctly applied"
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      sysctl {{ aslr_sysctl_name }} | awk '{print $3}'
  register: current_aslr_value
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Log current ASLR value"
  ansible.builtin.debug:
    msg: "Current ASLR value: {{ current_aslr_value.stdout | default('N/A') }}"
