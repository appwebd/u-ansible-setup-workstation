---
# Role        : enable_aslr
# Description : Enable Address Space Layout Randomization (ASLR)
# Wazuh ID    : 35542

- name: "Ensure /etc/sysctl.d directory exists"
  ansible.builtin.file:
    path: /etc/sysctl.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Set ASLR level in sysctl.d configuration file"
  ansible.builtin.lineinfile:
    path: "{ aslr_sysctl_file }"
    regexp: "^\\s*{ aslr_sysctl_key }\\s*="
    line: "{ aslr_sysctl_key } = { aslr_expected_value }"
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present
  notify: Reload sysctl settings

- name: "Verify ASLR configuration file content"
  ansible.builtin.slurp:
    src: "{ aslr_sysctl_file }"
  register: aslr_config_content
  changed_when: false
  failed_when: false
  when: aslr_enabled

- name: "Set active ASLR level via sysctl"
  ansible.builtin.command: sysctl -w kernel.randomize_va_space={ aslr_expected_value }
  changed_when: false
  failed_when: false
  when: aslr_enabled

- name: "Verify ASLR is enabled at runtime"
  ansible.builtin.command: sysctl kernel.randomize_va_space
  register: aslr_runtime_check
  changed_when: false
  failed_when: false
  when: aslr_enabled

- name: "Fail if ASLR is not enabled"
  ansible.builtin.fail:
    msg: "ASLR is not enabled at runtime. Expected value: { aslr_expected_value },
            Actual: {{ aslr_runtime_check.stdout | regex_replace('kernel.randomize_va_space\\s*=\\s*', '') }}"
  when:
    - aslr_enabled
    - aslr_runtime_check is changed
    - (aslr_runtime_check.stdout | regex_replace('kernel.randomize_va_space\\s*=\\s*', '')) | int != aslr_expected_value
