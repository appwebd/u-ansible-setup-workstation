---
# Handler to regenerate GRUB configuration after changes
- name: Regenerate GRUB configuration
  ansible.builtin.command:
    cmd: "{{ grub_binary_path }} -o {{ effective_grub_cfg_path | default(boot_grub_cfg_path) }}"
  changed_when: true
  when:
    - grub_binary_path is defined
    - effective_grub_cfg_path is defined or boot_grub_cfg_path is defined
