---
# Role        : sshd_kexalgorithms
# Description : Ensure sshd KexAlgorithms is configured (Wazuh ID 35651)
# Wazuh ID    : 35651

- name: "Gather package facts to detect sshd"
  ansible.builtin.package_facts:
    manager: auto

- name: "Check if openssh-server package is installed"
  ansible.builtin.set_fact:
    openssh_server_package_installed: "{{ 'openssh-server' in ansible_facts.packages }}"

- name: "Task block when openssh-server is installed"
  when: openssh_server_package_installed | bool
  become: true
  block:

    - name: "Ensure SSH KexAlgorithms are configured in sshd_config"
      ansible.builtin.lineinfile:
        path: "{{ sshd_kexalgorithms_file }}"
        regexp: '^\s*#?\s*KexAlgorithms\s+'
        line: "KexAlgorithms {{ sshd_kexalgorithms_line }}"
        state: present
        owner: root
        group: root
        mode: '0600'
        backup: true
        insertafter: '^\s*#?\s*(Include|Match|KexAlgorithms)'
      notify: Restart SSH Service

    - name: "Ensure weak KexAlgorithms are explicitly blacklisted"
      ansible.builtin.lineinfile:
        path: "{{ sshd_kexalgorithms_file }}"
        regexp: '^\s*#?\s*KexAlgorithms\s+-'
        line: "KexAlgorithms {{ sshd_kexalgorithms_blacklist_line }}"
        state: present
        owner: root
        group: root
        mode: '0600'
        backup: true
        insertbefore: EOF
      notify: Restart SSH Service
      when: sshd_kexalgorithms_blacklist | length > 0

    - name: "Verify SSH service is running and enabled"
      ansible.builtin.service:
        name: "{{ sshd_service_name }}"
        state: started
        enabled: true
      register: sshd_service_status
      failed_when: sshd_service_status is failed and '"Failed to start ssh.service" in sshd_service_status.msg'

- name: Verify if openssh-server is installed
  ansible.builtin.debug:
    msg: "openssh-server IS NOT installed on this host. SSH configuration tasks are skipped."
  when: "'openssh-server' not in ansible_facts.packages"
