---
# Role: disable_squid
# Description: Handlers for the disable_squid role

- name: Restart Squid
  ansible.builtin.systemd:
    name: "{{ squid_service_name }}"
    state: restarted
    daemon_reload: true

- name: Reload Squid
  ansible.builtin.systemd:
    name: "{{ squid_service_name }}"
    state: reloaded
    daemon_reload: true
