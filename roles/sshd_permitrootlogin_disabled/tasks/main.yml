---
# Role        : sshd_permitrootlogin_disabled
# Description : Ensure sshd PermitRootLogin is disabled (Wazuh ID 35659)
# Wazuh ID    : 35659
# Remediation : Set PermitRootLogin no above any Include and Match entries.
#               First occurrence of an option takes precedence.

- name: "Remove any existing PermitRootLogin entries (commented or uncommented)"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^\s*#?\s*[Pp]ermit[Rr]oot[Ll]ogin\s+'
    state: absent
  when:
    - sshd_config_file is defined

- name: "Ensure PermitRootLogin is set to no in sshd_config (before any Include/Match entries)"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^PermitRootLogin\s+'
    line: "PermitRootLogin {{ sshd_permitrootlogin_value }}"
    state: present
    owner: root
    group: root
    mode: '0644'
    insertbefore: '^\s*(#?Include\s+.*|Match\s+)'
    validate: 'sshd -t -f %s'
  notify: Restart sshd
  when:
    - sshd_config_file is defined
    - sshd_permitrootlogin_value | lower == 'no'
