---
# defaults/main.yml
# Default variables for sshd_permitrootlogin_disabled role
# These values can be overridden by inventory or playbook variables
# Ubuntu uses 'ssh' as the service name (not 'sshd')

sshd_config_file: /etc/ssh/sshd_config
sshd_permitrootlogin_value: "no"
sshd_service_name: ssh
