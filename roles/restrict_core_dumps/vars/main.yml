---
# vars/main.yml
# Internal constants for restrict_core_dumps role
# These are not intended to be overridden by users

restrict_core_dumps_limits_content: "* hard core 0"
restrict_core_dumps_sysctl_content: "fs.suid_dumpable = 0"
restrict_core_dumps_coredump_conf_content: |
  [Coredump]
  Storage=none
  ProcessSizeMax=0
  MaxUse=0
