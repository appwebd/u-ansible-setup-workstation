---
# Role: restrict_su_access
# Description: Handlers for the restrict_su_access role

- name: Restart Systemd PAM
  ansible.builtin.systemd:
    name: systemd-logind
    state: restarted
  register: systemd_restart_result
  failed_when:
    - systemd_restart_result is failed and systemd_restart_result.msg is not regex("No service or unit found")
