---
# Role        : ensure_permissions_on_etc_group
# Description : Ensure permissions on /etc/group are configured (Wazuh ID 35763)
# Wazuh ID    : 35763

- name: "Ensure /etc/group has correct ownership"
  ansible.builtin.file:
    path: "{{ etc_group_path }}"
    owner: "{{ etc_group_owner }}"
    group: "{{ etc_group_group }}"
    mode: "{{ etc_group_mode }}"
  register: ensure_group_ownership
  failed_when: ensure_group_ownership is failed and "No such file or directory" not in ensure_group_ownership.msg

- name: "Verify /etc/group permissions are 0644"
  ansible.builtin.stat:
    path: "{{ etc_group_path }}"
  register: group_stat_result
  failed_when: group_stat_result is failed and "No such file or directory" not in group_stat_result.msg

- name: "Ensure /etc/group has proper permissions (fallback verification)"
  ansible.builtin.command: stat --format="%a" "{{ etc_group_path }}"
  register: group_mode_octal
  changed_when: false
  failed_when: group_mode_octal.rc != 0 and "No such file or directory" not in group_mode_octal.stderr
  when: group_stat_result.stat.exists | default(false)
