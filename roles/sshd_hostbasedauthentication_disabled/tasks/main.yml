---
# Role        : sshd_hostbasedauthentication_disabled
# Description : Ensure sshd HostbasedAuthentication is disabled
# Wazuh ID    : 35649

- name: "Ensure HostbasedAuthentication is set to no in sshd_config"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^\s*#*\s*(HostbasedAuthentication\s+)(yes|no)\s*$'
    line: 'HostbasedAuthentication no'
    state: present
    owner: root
    group: root
    mode: '0644'
    backrefs: true
  notify: Restart SSH Service

- name: "Ensure HostbasedAuthentication is set to no (non-commented line)"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^\s*#*\s*(hostbasedAuthentication\s+)(yes|no)\s*$'
    line: 'HostbasedAuthentication no'
    state: present
    owner: root
    group: root
    mode: '0644'
  notify: Restart SSH Service

- name: "Verify HostbasedAuthentication is set to no"
  ansible.builtin.shell: |
    set -euo pipefail
    sshd -T 2>/dev/null | grep -i '^hostbasedauthentication no$'
  args:
    executable: /bin/bash
  changed_when: false
  register: sshd_check_result
  failed_when: >-
    sshd_check_result.rc != 0 and
    not (
      sshd_check_result.stderr | regex_search('sshd: (unknown|illegal|invalid) option')
    )
  check_mode: false
