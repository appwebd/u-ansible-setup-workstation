---
# Role        : sshd_permitemptypasswords_disabled
# Description : Ensure sshd PermitEmptyPasswords is disabled
# Wazuh ID    : 35658
# Remediation : Set PermitEmptyPasswords no above any Include and Match entries.
#               First occurrence of an option takes precedence.

- name: "Remove any existing PermitEmptyPasswords entries (commented or uncommented)"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^\s*#?\s*[Pp]ermit[Ee]mpty[Pp]asswords\s+'
    state: absent
  when:
    - sshd_config_file is defined

- name: "Ensure PermitEmptyPasswords is set to no in sshd_config (before any Include/Match entries)"
  ansible.builtin.lineinfile:
    path: "{{ sshd_config_file }}"
    regexp: '^PermitEmptyPasswords\s+'
    line: "PermitEmptyPasswords {{ sshd_permit_empty_passwords_value }}"
    state: present
    owner: root
    group: root
    mode: '0644'
    insertbefore: '^\s*(#?Include\s+.*|Match\s+)'
    validate: 'sshd -t -f %s'
  notify: Restart sshd
  when:
    - sshd_config_file is defined
    - sshd_permit_empty_passwords_value | lower == 'no'
