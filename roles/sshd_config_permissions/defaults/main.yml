---
# defaults/main.yml
# Default variables for sshd_config_permissions role
# These values can be overridden by inventory or playbook variables

sshd_config_file: /etc/ssh/sshd_config
sshd_config_dir: /etc/ssh/sshd_config.d
sshd_config_owner: root
sshd_config_group: root
sshd_config_mode: "0600"
sshd_config_dir_mode: "0750"
