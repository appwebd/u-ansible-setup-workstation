---
# Role        : sshd_config_permissions
# Description : Ensure permissions on /etc/ssh/sshd_config and .conf files in /etc/ssh/sshd_config.d are configured
# Wazuh ID    : 35640

- name: "Ensure /etc/ssh/sshd_config ownership and permissions are correctly set"
  ansible.builtin.file:
    path: "{{ sshd_config_permissions.file }}"
    owner: "{{ sshd_config_owner }}"
    group: "{{ sshd_config_group }}"
    mode: "{{ sshd_config_mode }}"
  when: ansible_facts.os_family == "Debian"
  register: sshd_config_file_result
  changed_when: sshd_config_file_result is changed

- name: "Ensure /etc/ssh/sshd_config.d directory ownership and permissions are correctly set"
  ansible.builtin.file:
    path: "{{ sshd_config_permissions.dir }}"
    owner: "{{ sshd_config_owner }}"
    group: "{{ sshd_config_group }}"
    mode: "{{ sshd_config_dir_mode }}"
    state: directory
  when: ansible_facts.os_family == "Debian"
  register: sshd_config_dir_result
  changed_when: sshd_config_dir_result is changed

- name: "Ensure all .conf files in /etc/ssh/sshd_config.d have correct ownership and permissions"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ sshd_config_owner }}"
    group: "{{ sshd_config_group }}"
    mode: "{{ sshd_config_mode }}"
  loop: "{{ ansible_facts.files | default([]) }}"
  loop_control:
    loop_var: item
    label: "{{ item }}"
  when:
    - ansible_facts.os_family == "Debian"
    - item is file
    - item | regex_search('\\.conf$')
  register: sshd_config_d_files_result
  changed_when: sshd_config_d_files_result.results | selectattr('changed', 'equalto', true) | list | length > 0
