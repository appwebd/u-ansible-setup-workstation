---
# Role        : configure_chrony_user
# Description : Ensure chrony is running as user _chrony
# Wazuh ID    : 35591


- name: "Check if chrony package is installed"
  ansible.builtin.package_facts:
    manager: auto

- name: "Ensure chrony group exists (system group)"
  ansible.builtin.group:
    name: "_chrony"
    system: true
    state: present

- name: "Ensure chrony user exists with correct attributes"
  ansible.builtin.user:
    name: "_chrony"
    group: "_chrony"
    home: "/var/lib/chrony"
    shell: "/usr/sbin/nologin"
    system: true
    create_home: false
    state: present

- name: "Ensure chrony configuration directory exists"
  ansible.builtin.file:
    path: "{{ chrony_config_dir | default('/etc/chrony') }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Ensure conf.d directory exists"
  ansible.builtin.file:
    path: "{{ chrony_conf_d_dir | default('/etc/chrony/conf.d') }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Ensure chrony runs as user _chrony"
  ansible.builtin.lineinfile:
    path: "{{ chrony_conf_file | default('/etc/chrony/chrony.conf') }}"
    regexp: '^user\s+.*$'
    line: "user _chrony"
    state: present
    create: true
    mode: "0644"
  notify: Restart chronyd

- name: "Ensure no conflicting time sync service is active (systemd-timesyncd)"
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: stopped
    masked: true
  when:
    - restrict_timesyncd | default(false) | bool
  ignore_errors: false
  failed_when: false

- name: "Verify chrony service is running as _chrony"
  ansible.builtin.shell: |
    ps -eo user,comm | grep '_chrony.*chronyd' || true
  register: chrony_user_check
  changed_when: false
  failed_when: false
  ignore_errors: true

- name: "Warn if chrony is not running as _chrony"
  ansible.builtin.debug:
    msg: "WARNING: chronyd may not be running as '_chrony'. Check /etc/chrony/chrony.conf and restart service."
  when:
    - chrony_user_check.rc != 0 or "_chrony" not in chrony_user_check.stdout

- name: "Ensure chrony package is installed"
  ansible.builtin.apt:
    name: "{{ chrony_package_name | default('chrony') }}"
    state: present
    update_cache: true
    cache_valid_time: 86400
  register: chrony_install_result
  when:
    - "'chrony' in ansible_facts.packages"

- name: "Ensure chrony is restarted to apply configuration"
  ansible.builtin.systemd:
    name: "{{ chronyd_service_name | default('chronyd') }}"
    state: restarted
    daemon_reload: true
  notify: Restart chronyd
